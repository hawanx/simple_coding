<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Calculator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">Tax Calculator</h1>
            <p class="text-indigo-100 text-sm mt-1">FY 2025-26 | New Regime</p>
        </div>

        <form method="POST" class="p-6 space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Monthly Salary (Gross)</label>
                <div class="relative">
                    <span class="absolute left-3 top-2.5 text-slate-400">₹</span>
                    <input type="number" name="monthly_salary" placeholder="135511" required
                        class="w-full pl-8 pr-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Monthly EPF</label>
                    <input type="number" name="epf" value="1800"
                        class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Monthly LWF</label>
                    <input type="number" name="lwf" value="0"
                        class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                </div>
            </div>

            <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-indigo-200 transition-all active:scale-[0.98]">
                Calculate Net Salary
            </button>
        </form>

        {% if result %}
        <div class="p-6 bg-slate-50 border-t border-slate-100 space-y-4">
            <div class="flex justify-between items-center text-slate-600">
                <span>Annual Tax Paid:</span>
                <span class="font-bold text-red-500">₹{{ "{:,}".format(result.total_tax) }}</span>
            </div>

            <div class="p-4 bg-white rounded-xl border border-slate-200 shadow-sm">
                <p class="text-xs text-slate-500 uppercase tracking-wider font-semibold">Net In-Hand (Monthly)</p>
                <p class="text-3xl font-extrabold text-slate-900">₹{{ "{:,}".format(result.net_monthly) }}</p>
                <p class="text-xs text-green-600 mt-1">✓ After Tax, EPF & LWF</p>
            </div>

            <div class="text-center">
                <p class="text-xs text-slate-400">Net Money (Before EPF): ₹{{ "{:,}".format(result.gross_monthly) }}</p>
            </div>
        </div>
        {% endif %}
    </div>

<script>
    const STORAGE_KEY = 'salary_calc_data';
    const EXPIRY_DAYS = 30;

    // 1. Page load par data recover karo
    window.onload = function() {
        const rawData = localStorage.getItem(STORAGE_KEY);
        if (rawData) {
            const data = JSON.parse(rawData);
            const now = new Date().getTime();

            // Check expiry (30 din = 30 * 24 * 60 * 60 * 1000 ms)
            if (now - data.timestamp < EXPIRY_DAYS * 24 * 60 * 60 * 1000) {
                document.getElementsByName('monthly_salary')[0].value = data.salary;
                document.getElementsByName('epf')[0].value = data.epf;
                document.getElementsByName('lwf')[0].value = data.lwf;
            } else {
                localStorage.removeItem(STORAGE_KEY);
            }
        }
    };

    // 2. Form submit par data save karo
    document.querySelector('form').onsubmit = function() {
        const data = {
            salary: document.getElementsByName('monthly_salary')[0].value,
            epf: document.getElementsByName('epf')[0].value,
            lwf: document.getElementsByName('lwf')[0].value,
            timestamp: new Date().getTime()
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    };
</script>

</body>
</html>
